<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Geral</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 80px;
            background-color: #fef2f8;
            height: 100vh;
            padding-top: 1rem;
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sidebar .nav-link {
            color: #000;
            text-align: center;
            padding: 20px 10px;
            font-size: 0.85rem;
        }

        .sidebar .nav-link.active,
        .sidebar .nav-link:hover {
            background-color: #f19ed1;
            border-radius: 10px;
        }

        .sidebar i {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .content {
            margin-left: 80px;
            padding: 2rem;
            width: 100%;
        }

        .profile {
            display: flex;
            align-items: center;
            justify-content: end;
        }

        .profile img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .profile .bi-chevron-right {
            margin-left: 5px;
            cursor: pointer;
        }

        .search-bar {
            background-color: #eaeaea;
            padding: 1rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2rem 0 1rem;
        }

        .search-bar input {
            border: none;
            border-radius: 5px;
            padding: 0.5rem;
            width: 100%;
        }

        .table thead {
            background-color: #f1f1f1;
        }

        .pagination {
            margin-top: 1rem;
        }

        .btn-add-request {
            background-color: white;
            border: 1px solid #ccc;
            padding: 6px 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <a href="#" class="nav-link">
            <i class="bi bi-bar-chart-fill"></i><br>Dashboard
        </a>
        <a href="#" class="nav-link active">
            <i class="bi bi-pencil"></i><br>Estoque Geral
        </a>
        <a href="#" class="nav-link">
            <i class="bi bi-check2-circle"></i><br>Solicitações
        </a>
        <a href="#" class="nav-link">
            <i class="bi bi-person"></i><br>Usuários
        </a>
    </div>

    <div class="content">
        <div class="profile">
            <img src="https://via.placeholder.com/40" alt="Usuário">
            <div class="text-end">
                <strong>Usuário</strong><br>
                <small class="text-muted">Administrador</small>
            </div>
            <i class="bi bi-chevron-right" onclick="location.href='../pages/index.html'"></i>
        </div>

        <h2 class="mt-4">Produtos</h2>

        <div class="search-bar">
            <div class="input-group w-50">
                <input type="text" class="form-control" placeholder="Buscar produto...">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
            </div>
            <button class="btn-add-request" onclick="location.href='../pages/novaSolicitacaoEstoquista.html'">
                Incluir nova <i class="bi bi-plus-lg"></i>
            </button>
        </div>

        <div class="table-responsive">
            <table class="table align-middle text-center">
                <thead>
                    <tr>
                        <th><input type="checkbox"></th>
                        <th>Produto</th>
                        <th>Estoque</th>
                        <th>Preço de Custo</th>
                        <th>Preço de Venda</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="checkbox"></td>
                        <td>Nome</td>
                        <td>52</td>
                        <td>R$45,00</td>
                        <td>R$45,00</td>
                        <td>
                            <i class="bi bi-pencil-square me-2"></i>
                            <i class="bi bi-trash text-danger"></i>
                        </td>
                    </tr>
                    <tr>
                        <td><input type="checkbox"></td>
                        <td>Nome</td>
                        <td>52</td>
                        <td>R$62,00</td>
                        <td>R$62,00</td>
                        <td>
                            <i class="bi bi-pencil-square me-2"></i>
                            <i class="bi bi-trash text-danger"></i>
                        </td>
                    </tr>
                    <tr>
                        <td><input type="checkbox"></td>
                        <td>Nome</td>
                        <td>52</td>
                        <td>R$30,00</td>
                        <td>R$30,00</td>
                        <td>
                            <i class="bi bi-pencil-square me-2"></i>
                            <i class="bi bi-trash text-danger"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

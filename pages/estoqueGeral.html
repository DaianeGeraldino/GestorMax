<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Geral</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styleEstoqueGeral.css">

</head>

<body>
    <div class="sidebar">
        <a href="#" class="nav-link">
            <i class="bi bi-bar-chart-fill"></i><br>Dashboard
        </a>
        <a href="#" class="nav-link active">
            <i class="bi bi-pencil"></i><br>Estoque Geral
        </a>
        <a href="#" class="nav-link">
            <i class="bi bi-check2-circle"></i><br>Solicitações
        </a>
        <a href="#" class="nav-link">
            <i class="bi bi-person"></i><br>Usuários
        </a>
    </div>

    <div class="content">
        <div class="profile">
            <img src="https://via.placeholder.com/40" alt="Usuário">
            <div class="text-end">
                <strong>Usuário</strong><br>
                <small class="text-muted">Administrador</small>
            </div>
            <i class="bi bi-chevron-right" onclick="location.href='../pages/index.html'"></i>
        </div>

        <h2 class="mt-4">Produtos</h2>

        <div class="search-bar">
            <div class="input-group w-50">
                <input type="text" class="form-control" placeholder="Buscar produto...">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
            </div>
            <button class="btn-add-request" onclick="location.href='../pages/novaSolicitacaoEstoquista.html'">
                Incluir nova <i class="bi bi-plus-lg"></i>
            </button>
        </div>

        <div class="table-responsive">
            <table class="table align-middle text-center">
                <thead>
                    <tr>
                        <th><input type="checkbox"></th>
                        <th>Produto</th>
                        <th>Estoque</th>
                        <th>Preço de Custo</th>
                        <th>Preço de Venda</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="checkbox"></td>
                        <td>Nome</td>
                        <td>52</td>
                        <td>R$45,00</td>
                        <td>R$45,00</td>
                        <td>
                            <i class="bi bi-pencil-square me-2"></i>
                            <i class="bi bi-trash text-danger"></i>
                        </td>
                    </tr>
                    <tr>
                        <td><input type="checkbox"></td>
                        <td>Nome</td>
                        <td>52</td>
                        <td>R$62,00</td>
                        <td>R$62,00</td>
                        <td>
                            <i class="bi bi-pencil-square me-2"></i>
                            <i class="bi bi-trash text-danger"></i>
                        </td>
                    </tr>
                    <tr>
                        <td><input type="checkbox"></td>
                        <td>Nome</td>
                        <td>52</td>
                        <td>R$30,00</td>
                        <td>R$30,00</td>
                        <td>
                            <i class="bi bi-pencil-square me-2"></i>
                            <i class="bi bi-trash text-danger"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
